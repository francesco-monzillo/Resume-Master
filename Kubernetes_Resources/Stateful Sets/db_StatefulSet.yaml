apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
spec:
  serviceName: "mongodb-service"
  replicas: 3
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0.12
        imagePullPolicy: IfNotPresent
        command:
        - mongod
        - "--replSet"
        - "rs0"
        - "--bind_ip_all"
        ports:
        - containerPort: 27017
          name: mongodb
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db

        envFrom:
        - secretRef:
            name: db-secret

      #volumes:
      #- name: mongodb-data
      #  hostPath:
      #    path: /mnt/mongodb-data # Matches the containerPath in kind-config.yaml

  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes: [ "ReadWriteOnce" ] # Safe to use RWO because each pod gets its own volume
      resources:
        requests:
          storage: 500Mi

